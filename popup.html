<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 280px;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      font-size: 13px;
      background: #fafafa;
      color: #333;
    }
    .header {
      background: #2b579a;
      color: #fff;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
    }
    .header small {
      display: block;
      opacity: 0.8;
      font-size: 11px;
      margin-top: 2px;
      font-weight: normal;
    }
    .content {
      padding: 12px 16px;
    }
    .status {
      background: #f0f7ff;
      border: 1px solid #d0e4f7;
      border-radius: 4px;
      padding: 8px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #2b579a;
    }
    .status.inactive {
      background: #f5f5f5;
      border-color: #e0e0e0;
      color: #666;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
    }
    .btn:hover {
      border-color: #999;
      background: #f8f8f8;
    }
    .btn:active {
      background: #f0f0f0;
    }
    .btn-icon {
      width: 24px;
      height: 24px;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      flex-shrink: 0;
    }
    .btn-word .btn-icon { background: #2b579a; }
    .btn-excel .btn-icon { background: #217346; }
    .btn-restore {
      border-color: #e74c3c;
      color: #e74c3c;
    }
    .btn-restore:hover {
      background: #fef5f5;
    }
    .shortcuts {
      font-size: 11px;
      color: #888;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }
    .shortcuts kbd {
      background: #f0f0f0;
      border: 1px solid #d0d0d0;
      border-radius: 3px;
      padding: 1px 5px;
      font-family: monospace;
      font-size: 10px;
    }
    .error {
      color: #e74c3c;
      font-size: 12px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    Office Reader
    <small id="siteName">检测站点中...</small>
  </div>
  <div class="content">
    <div class="status inactive" id="status">未激活</div>
    <div class="btn-group">
      <button class="btn btn-word" id="btnWord">
        <span class="btn-icon">W</span>
        <span>Word 文档模式</span>
      </button>
      <button class="btn btn-excel" id="btnExcel">
        <span class="btn-icon">X</span>
        <span>Excel 表格模式</span>
      </button>
      <button class="btn btn-restore" id="btnRestore" style="display:none;">
        恢复原始页面
      </button>
    </div>
    <div class="shortcuts">
      快捷键：<kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>H</kbd> 切换伪装
    </div>
    <div class="error" id="error"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
